  <rect width="64" height="64" rx="18" fill="#030303"/>
  <circle cx="32" cy="32" r="29" fill="#050505"/>
  <ellipse cx="32" cy="32" rx="25" ry="20" fill="none" stroke="url(#halo)" stroke-width="4" opacity="0.9" filter="url(#softGlow)"/>
  <ellipse cx="32" cy="32" rx="32" ry="7" fill="url(#disk)" opacity="0.96" transform="rotate(-11 32 32)" filter="url(#softGlow)"/>
  <circle cx="32" cy="32" r="13" fill="#000000"/>
  <circle cx="32" cy="32" r="14.5" fill="none" stroke="#f1dfcf" stroke-opacity="0.28" stroke-width="1.2"/>
  <path d="M17 29c9-5 21-5 30 0" fill="none" stroke="#fff" stroke-opacity="0.2" stroke-width="1.4" stroke-linecap="round"/>
